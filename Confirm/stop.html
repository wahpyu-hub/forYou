<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Game Is Over</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="transition.css">
    <style>
        /* Override body background untuk halaman ini */
        body {
            background: radial-gradient(circle, #3d0b1a 0%, #000000 80%);
        }

        .stop-container {
            text-align: center;
            animation: fadeInUp 1s ease-out forwards;
            padding: 20px;
        }

        .stop-title {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: clamp(2rem, 8vw, 3.2rem);
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow:
                0 0 20px rgba(255, 255, 255, 0.4),
                0 0 40px rgba(255, 100, 100, 0.3);
            margin-bottom: 16px;
            animation: fadeInUp 0.8s ease-out both;
        }

        .stop-subtitle {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: clamp(1rem, 4vw, 1.3rem);
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 48px;
            font-weight: 400;
            animation: fadeInUp 0.8s ease-out 0.1s both;
        }

        .choice-label {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: clamp(1rem, 4vw, 1.25rem);
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            margin-bottom: 28px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }

        .btn-yes {
            background: linear-gradient(135deg, #e0e0e0, #ffffff);
            color: #333;
            border: none;
            padding: 16px 52px;
            font-size: 1.3rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #a0a0a0, 0 8px 20px rgba(0,0,0,0.3);
            transition: all 0.12s ease;
            touch-action: manipulation;
            letter-spacing: 0.5px;
        }

        .btn-yes:hover {
            background: linear-gradient(135deg, #f0f0f0, #ffffff);
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #a0a0a0, 0 12px 28px rgba(0,0,0,0.35);
        }

        .btn-yes:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #a0a0a0, 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn-no {
            background: transparent;
            color: rgba(255, 255, 255, 0.75);
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 16px 52px;
            font-size: 1.3rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            transition: all 0.12s ease;
            touch-action: manipulation;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
        }

        .btn-no:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.55);
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .btn-no:active {
            transform: translateY(2px);
        }

        /* Divider ornamen */
        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            margin: 0 auto 40px;
            border-radius: 2px;
            animation: fadeInUp 0.8s ease-out 0.15s both;
        }

        @keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
    </style>
</head>
<body>
    <div class="stop-container">
        <h1 class="stop-title">The Game Is Over</h1>
        <div class="divider"></div>
        <p class="choice-label">Ingin kembali bermain game?</p>
        <div class="btn-group">
            <button class="btn-yes" id="yesBtn">Yes</button>
            <button class="btn-no"  id="noBtn">No</button>
        </div>
    </div>

    <script src="transition.js"></script>
    <script>
        document.getElementById('yesBtn').addEventListener('click', function() {
            navigate('../LastGame/result-falling.html');
        });

        document.getElementById('noBtn').addEventListener('click', function() {
            navigate('../pesan/index.html');
        });
    </script>
</body>
</html>
